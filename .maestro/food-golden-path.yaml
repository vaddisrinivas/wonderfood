appId: com.wonderfood.app
name: Food golden path debug app
---
- launchApp:
    clearState: true
- openLink: wonderfood://food
- assertVisible:
    id: food-screen
- assertVisible: Empty. Load demo or add real local records.
- tapOn:
    id: food-add-pantry
- assertVisible: Added Baby spinach.
- tapOn:
    id: food-add-meal
- assertVisible: Added Salmon rice bowls.
- tapOn:
    id: food-add-shopping
- assertVisible: Added Rice vinegar.
- tapOn:
    id: food-tab-shop
- assertVisible: Rice vinegar
- tapOn: Toggle Rice vinegar
- assertVisible: Rice vinegar is now in cart.
- tapOn:
    id: food-open-search
- assertVisible:
    id: food-search-screen
- tapOn:
    id: food-search-input
- inputText: spinach
- assertVisible: Baby spinach
- tapOn: Open search result Baby spinach
- assertVisible:
    id: record-title-input
- tapOn:
    id: record-details-input
- inputText: Maestro checked pantry edit
- tapOn: Save changes
- assertVisible: Saved locally in this view. Open Settings to connect a writable source.
- back
- openLink: wonderfood://food
- assertVisible:
    id: food-screen
- tapOn:
    id: food-archive-first
- assertVisible: Undo is available.
- tapOn:
    id: food-undo-archive
- assertVisible: Undo complete. Record restored.
- tapOn:
    id: food-export-backup
- assertVisible: Backup captured in debug memory
- tapOn:
    id: food-restore-backup
- assertVisible: Backup restored into local SQLite.
- stopApp
- launchApp:
    clearState: false
- openLink: wonderfood://food
- assertVisible:
    id: food-screen
- assertVisible: Salmon rice bowls
- assertVisible: Baby spinach
