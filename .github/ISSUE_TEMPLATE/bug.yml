name: Bug report
description: Report reproducible incorrect WonderFood behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [Today, Kitchen, Plan, Recipes, Shop, AI, Receipt, Integration, Data, Release]
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: What happened?
      description: Include the smallest reliable reproduction and expected behavior.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Device, Android version, build SHA, screenshots, and sanitized logs. Never attach pantry, receipt, health, token, or account data.
  - type: dropdown
    id: risk
    attributes:
      label: Data risk
      options: [No data changed, Reversible incorrect change, Possible data loss, Privacy or security concern]
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed personal food, receipt, health, account, and credential data.
          required: true
