name: Android Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate tag and signing secrets
        env:
          ANDROID_SIGNING_KEY_BASE64: ${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          version_name="$(sed -n 's/^[[:space:]]*versionName = "\([^"]*\)"/\1/p' app/build.gradle.kts)"
          test -n "$version_name"
          test "$GITHUB_REF_NAME" = "v$version_name"
          test -n "$ANDROID_SIGNING_KEY_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          printf '%s' "$ANDROID_SIGNING_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/wonderfood-release.jks"

      - name: Build signed release APKs
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/wonderfood-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew --no-daemon :app:assembleFossRelease :app:assemblePlayRelease

      - name: Verify and package APKs
        run: |
          set -euo pipefail
          source_foss_apk="$(find app/build/outputs/apk/foss/release -maxdepth 1 -name 'app-foss-release*.apk' ! -name '*unsigned*' | sort | head -n 1)"
          source_play_apk="$(find app/build/outputs/apk/play/release -maxdepth 1 -name 'app-play-release*.apk' ! -name '*unsigned*' | sort | head -n 1)"
          foss_apk="WonderFood-foss-${GITHUB_REF_NAME}.apk"
          play_apk="WonderFood-play-${GITHUB_REF_NAME}.apk"
          test -n "$source_foss_apk"
          test -n "$source_play_apk"
          apksigner="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -x "$apksigner"
          "$apksigner" verify --verbose --print-certs "$source_foss_apk"
          "$apksigner" verify --verbose --print-certs "$source_play_apk"
          cp "$source_foss_apk" "$foss_apk"
          cp "$source_play_apk" "$play_apk"
          sha256sum "$foss_apk" "$play_apk" > SHA256SUMS.txt

      - name: Prepare release notes
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            index($0, "## " version " ") == 1 { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > "$RUNNER_TEMP/release-notes.md"
          test -s "$RUNNER_TEMP/release-notes.md"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "WonderFood-foss-${GITHUB_REF_NAME}.apk#FOSS Android APK" \
            "WonderFood-play-${GITHUB_REF_NAME}.apk#Play Android APK" \
            "SHA256SUMS.txt#SHA-256 checksums" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "WonderFood ${GITHUB_REF_NAME#v}" \
            --notes-file "$RUNNER_TEMP/release-notes.md"
